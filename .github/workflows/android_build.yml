name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          # Adicionamos o caminho do package.json para o cache funcionar
          cache-dependency-path: artifacts/mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        # Mudamos para a pasta correta antes de instalar
        run: |
          cd artifacts/mobile
          npm install

      - name: Build Android APK
        # Entramos na pasta mobile e depois na android para rodar o gradle
        run: |
          cd artifacts/mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          # O caminho do arquivo final também muda
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
