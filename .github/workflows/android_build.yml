name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4 # Atualizado para v4
        with:
          version: 9 # Mudamos para a versão 9 para suportar Catalogs (@catalog:)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Recomendado para pnpm 9 e projetos React Native atuais
          cache: 'pnpm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        # Adicionamos --no-frozen-lockfile caso o lockfile precise de um pequeno ajuste automático na nuvem
        run: pnpm install --no-frozen-lockfile

      - name: Build Android APK
        run: |
          cd artifacts/mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
